<svg width="960" height="600" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="加班费核算演示动画">
  <rect width="960" height="600" fill="#e8e2d5"/>
  <rect x="52" y="54" width="856" height="492" fill="#f7f5ef" stroke="#c8bfae"/>
  <text x="82" y="105" fill="#173e36" font-family="Arial, sans-serif" font-size="28" font-weight="700">Overtime Calculation Demo</text>

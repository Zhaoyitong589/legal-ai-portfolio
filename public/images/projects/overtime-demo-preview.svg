    <g stroke="#d8d0c1"><line x1="118" y1="230" x2="282" y2="230"/><line x1="118" y1="280" x2="282" y2="280"/><line x1="118" y1="330" x2="282" y2="330"/><line x1="118" y1="380" x2="282" y2="380"/></g>
    <rect x="366" y="150" width="228" height="315" rx="8" fill="#ffffff" stroke="#d8d0c1"/>
    <text x="406" y="190" fill="#65706b" font-size="18">Rules + Formula</text>
